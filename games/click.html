<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>クリックゲーム | ミニゲームコレクション</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">クリックゲーム</h1>
    <p class="site-desc">10秒間で何回クリックできるか挑戦</p>
  </header>

  <main class="container">
    <nav style="margin-bottom: 1rem;">
      <a href="../index.html">&larr; ゲーム一覧に戻る</a>
    </nav>

    <section class="game-layout">
      <header class="game-header">
        <p class="game-info">
          スタートを押すと10秒間のカウントが始まります。
          オレンジの丸をできるだけたくさんクリックしてください。
        </p>
      </header>

      <div class="game-main">
        <div class="click-game">
          <div class="click-game-status">
            <div>スコア: <span id="score">0</span></div>
            <div>残り時間: <span id="time">10.0</span> 秒</div>
            <div>ベスト: <span id="best-score">0</span></div>
          </div>

          <div id="click-target" class="click-target">
            CLICK
          </div>

          <div class="game-controls">
            <button id="start-btn" class="btn-primary">スタート</button>
            <button id="reset-btn" class="btn-secondary">リセット</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; 2026 Mini Game Site</small>
  </footer>

  <script src="../assets/js/game-click.js"></script>
</body>
</html>
