<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>タイピングゲーム | ミニゲームコレクション</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .typing-game {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .typing-word {
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      text-align: center;
    }

    .typing-input {
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 1rem;
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
    }

    .typing-stats {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.95rem;
    }

    .typing-message {
      text-align: center;
      min-height: 1.2rem;
      color: #a5b4fc;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">タイピングゲーム</h1>
    <p class="site-desc">30秒で何語打てるかチャレンジ</p>
  </header>

  <main class="container">
    <nav style="margin-bottom: 1rem;">
      <a href="../index.html">&larr; ゲーム一覧に戻る</a>
    </nav>

    <section class="game-layout">
      <header class="game-header">
        <p class="game-info">
          スタートを押すと30秒のカウントが始まります。
          表示された英単語を正確に入力して Enter を押してください。
        </p>
      </header>

      <div class="game-main">
        <div class="typing-game">
          <div class="typing-stats">
            <div>スコア: <span id="typing-score">0</span></div>
            <div>残り時間: <span id="typing-time">30.0</span> 秒</div>
            <div>ベスト: <span id="typing-best">0</span></div>
          </div>

          <div class="typing-word" id="typing-word">press START</div>

          <input
            id="typing-input"
            class="typing-input"
            type="text"
            autocomplete="off"
            placeholder="ここに入力して Enter"
            disabled
          />

          <div class="typing-message" id="typing-message"></div>

          <div class="game-controls" style="justify-content: center;">
            <button id="typing-start" class="btn-primary">スタート</button>
            <button id="typing-reset" class="btn-secondary">リセット</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; 2026 Mini Game Site</small>
  </footer>

  <script src="../assets/js/game-typing.js"></script>
</body>
</html>
